name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TextUtilities.slnx

      - name: Build
        run: dotnet build TextUtilities.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TextUtilities.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/TextUtilities/TextUtilities.csproj --configuration Release --no-build --output artifacts/packages

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version=$(grep -oPm1 '(?<=<Version>)[^<]+' src/TextUtilities/TextUtilities.csproj)
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ -z "$package_version" ]]; then
            echo "Could not determine package version from src/TextUtilities/TextUtilities.csproj"
            exit 1
          fi

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag version ($tag_version) does not match package version ($package_version)."
            exit 1
          fi

      - name: Publish to NuGet.org
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate
